{% extends "base_modern.html" %}

        <p class="text-8xl md:text-9xl font-black gradient-text mb-4" aria-hidden="true">403</p>

        <a href="{{ url_for('main.index') }}" class="btn-primary">Go Home</a>
    </div>
</div>
