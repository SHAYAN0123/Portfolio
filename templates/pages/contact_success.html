{% extends "base_modern.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center max-w-lg mx-auto">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center" aria-hidden="true">
            <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 id="success-title" class="text-3xl font-bold text-white mb-4">Message Sent!</h1>
        <p class="text-slate-400 mb-8">Thank you for reaching out. I'll get back to you as soon as possible.</p>
        <a href="{{ url_for('main.index') }}" class="btn-primary">Return Home</a>
    </div>
</div>
{% endblock %}
