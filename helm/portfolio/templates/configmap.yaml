apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portfolio.fullname" . }}
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
data:
  FLASK_ENV: {{ .Values.config.flaskEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PORT: {{ .Values.config.port | quote }}
  WORKERS: {{ .Values.config.workers | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
  STATIC_URL: {{ .Values.config.staticUrl | quote }}
  {{- if .Values.config.cdnUrl }}
  CDN_URL: {{ .Values.config.cdnUrl | quote }}
  {{- end }}
