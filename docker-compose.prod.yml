# =============================================================================
# Cloud-Agnostic Production Docker Compose
# =============================================================================
# Usage:
#   Development: docker compose up
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Works as a portable deployment unit for any platform supporting Docker Compose
# =============================================================================

services:
  # ===========================================================================
  # Main Application
  # ===========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: portfolio:latest
    container_name: portfolio-web
    
    # Port mapping - override PORT env var as needed
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    
    # Environment configuration
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - PORT=${PORT:-8000}
      - WORKERS=${WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Optional: External services
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      # Static files
      - STATIC_URL=${STATIC_URL:-/static}
      - CDN_URL=${CDN_URL:-}
    
    # Mount volumes for persistent data
    volumes:
      - app-logs:/app/logs
      - app-data:/app/data
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Logging configuration (works with any log aggregator)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network
    networks:
      - portfolio-network

  # ===========================================================================
  # Nginx Reverse Proxy (Optional - for self-hosted deployments)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    profiles:
      - with-nginx  # Only start with: docker compose --profile with-nginx up
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/var/www/static:ro
    
    depends_on:
      web:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    restart: unless-stopped
    
    networks:
      - portfolio-network

  # ===========================================================================
  # Redis Cache (Optional)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    profiles:
      - with-cache  # Only start with: docker compose --profile with-cache up
    
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis-data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    
    restart: unless-stopped
    
    networks:
      - portfolio-network

# =============================================================================
# Networks
# =============================================================================
networks:
  portfolio-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  app-logs:
  app-data:
  redis-data:
